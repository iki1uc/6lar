<style>
  #on3-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 680px;
    margin: 40px auto;
  }

  .on3-cell {
    height: 120px;
    background: #0b0b0b;
    border-radius: 10px;
    box-shadow: 0 0 12px #0af3;
    transition: 0.25s;
    position: relative;
    overflow: hidden;

    /* ⭐ on3 PULSE */
    animation: on3Pulse 2.4s infinite ease-in-out;
  }

  @keyframes on3Pulse {
    0%   { box-shadow: 0 0 12px #0af3; }
    50%  { box-shadow: 0 0 22px #0af9; }
    100% { box-shadow: 0 0 12px #0af3; }
  }
</style>
